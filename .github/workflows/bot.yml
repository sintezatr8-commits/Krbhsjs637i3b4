name: Mineflayer 24/7 Runner (TS Version)

on:
  push:
    branches: [ main ]
  workflow_dispatch:
  repository_dispatch:
    types: [ restart_bot ]

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Install dependencies
      run: npm install

    - name: Build TypeScript
      run: npm run build

    - name: Run Bot with Timeout
      env:
        DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
        DISCORD_CHANNEL_ID: ${{ secrets.DISCORD_CHANNEL_ID }}
        MC_HOST: ${{ secrets.MC_HOST }} 
        MC_PORT: ${{ secrets.MC_PORT }}
        MC_USERNAME: ${{ secrets.MC_USERNAME }}
      run: |
        # Запускаем уже скомпилированный JS файл из папки dist
        node dist/index.js &
        BOT_PID=$!
        
        echo "Панель управления запущена. Спим 5 часов 50 минут до ротации..."
        sleep 21000
        
        kill $BOT_PID

    - name: Trigger next workflow run (Self-Restart)
      run: |
        curl -X POST \
        -H "Accept: application/vnd.github+json" \
        -H "Authorization: Bearer ${{ secrets.RESTART_TOKEN }}" \
        https://api.github.com/repos/${{ github.repository }}/dispatches \
        -d '{"event_type": "restart_bot"}'
        
